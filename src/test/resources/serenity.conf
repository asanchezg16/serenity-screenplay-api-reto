serenity {
  logging = verbose
  encoding = "UTF-8"
  take.screenshots = FOR_EACH_ACTION
  console.colors = true

  # Crucial para Web, no afecta a la API si el Cast es correcto
  restart.browser.for.each = scenario

  test.root = "com.choucair"
  requirements.dir = "src/test/resources/features"
}

# --- CONFIGURACIÓN PARA API (Siempre disponible) ---
rest.api.baseurl = "http://localhost:3002/api"
rest.api.timeout = 30000

# --- CONFIGURACIÓN PARA WEB (Solo se activa si se usa el driver) ---
webdriver {
  driver = chrome
  autodownload = true
  base.url = "https://www.saucedemo.com"

  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = [
        "start-maximized",
        "remote-allow-origins=*",
        "incognito",
        "disable-gpu",
        "ignore-certificate-errors",
        "disable-popup-blocking"
      ]
    }
  }
}

# Mantenemos esto por compatibilidad, pero lo de arriba manda en el "Run" directo
environments {
  default {
    webdriver.base.url = "https://www.saucedemo.com"
  }
  api {
    rest.api.baseurl = "http://localhost:3002/api"
  }
}