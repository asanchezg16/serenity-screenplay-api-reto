# 1. Definimos las URLs una sola vez aquí arriba
url_web = "https://www.saucedemo.com"
url_api = "http://localhost:3002/api"

# 2. El interruptor global
environment = chrome

serenity {
  test.root = "com.choucair"
  # ... resto de tu config de serenity
}

environments {
  default {
    webdriver.base.url = ${url_web}
    rest.api.baseurl = ${url_api}
  }

  chrome {
    webdriver.driver = chrome
    webdriver.base.url = ${url_web}
    rest.api.baseurl = ${url_api}
    capabilities {
      browserName = "chrome"
      # ... tus chromeOptions
    }
  }

  api_only {
    webdriver.driver = provided
    rest.api.baseurl = ${url_api}
  }

  # Repites lo mismo para firefox y edge usando ${url_api} y ${url_web}
}